name: deploy-demo

on:
  push:
    branches: [claude/gifted-thompson-dsmsv5]
    paths: ['app/**', '.github/workflows/deploy-demo.yml']
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: app/package-lock.json
      - name: Установка зависимостей
        run: npm ci
        working-directory: app
      - name: Юнит-тесты
        run: npx vitest run
        working-directory: app
      - name: Сборка демо одним файлом
        run: npx vite build --config vite.demo.config.ts
        working-directory: app
      - name: Публикация в ветку gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: app/dist-demo
          force_orphan: true
          commit_message: 'Обновление демо-версии'
