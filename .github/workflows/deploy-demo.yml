name: deploy-demo

on:
  push:
    branches: [claude/gifted-thompson-dsmsv5]
    paths: ['app/**', '.github/workflows/deploy-demo.yml']
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: app/package-lock.json
      - name: Установка зависимостей
        run: npm ci
        working-directory: app
      - name: Юнит-тесты
        run: npx vitest run
        working-directory: app
      - name: Сборка демо одним файлом
        run: npx vite build --config vite.demo.config.ts
        working-directory: app
      - uses: actions/configure-pages@v5
        with:
          enablement: true
      - uses: actions/upload-pages-artifact@v3
        with:
          path: app/dist-demo

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
